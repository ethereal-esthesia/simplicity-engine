name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            xorg-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libdrm-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Configure (Debug)
        run: cmake --preset debug

      - name: Build (Debug)
        run: cmake --build --preset debug

      - name: Smoke Tests (Debug)
        shell: bash
        run: ./tools/smoke.sh debug

      - name: Configure (Release)
        run: cmake --preset release

      - name: Build (Release)
        run: cmake --build --preset release

      - name: All Tests (Release, Linux x86)
        if: runner.os == 'Linux'
        run: ctest --test-dir build/release --output-on-failure

      - name: Smoke Tests (Release, non-Linux)
        if: runner.os != 'Linux'
        shell: bash
        run: ./tools/smoke.sh release
