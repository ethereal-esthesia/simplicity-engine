name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  linux-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runs_on: ubuntu-latest
          - arch: arm64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    container:
      image: ubuntu:24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            git \
            ca-certificates \
            pkg-config \
            xorg-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libdrm-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev

      - name: Package Linux archive
        env:
          ARCH_LABEL: ${{ matrix.arch }}
        run: ./tools/package_linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-linux-${{ matrix.arch }}
          path: dist/simplicity-engine-linux-${{ matrix.arch }}.tar.gz

  windows-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runs_on: windows-latest
          - arch: arm64
            runs_on: windows-11-arm
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Ninja
        run: choco install ninja -y

      - name: Package Windows ZIP
        shell: pwsh
        run: ./tools/package_windows_zip.ps1 -ArchLabel "${{ matrix.arch }}"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-windows-${{ matrix.arch }}
          path: dist/simplicity-engine-windows-${{ matrix.arch }}.zip

  macos-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runs_on: macos-latest
          - arch: x64
            runs_on: macos-13
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Ninja
        run: brew install ninja

      - name: Package macOS archive
        env:
          ARCH_LABEL: ${{ matrix.arch }}
        run: ./tools/package_macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-macos-${{ matrix.arch }}
          path: dist/simplicity-engine-macos-${{ matrix.arch }}.tar.gz

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - linux-release
      - windows-release
      - macos-release
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/release-linux-*/simplicity-engine-linux-*.tar.gz
            artifacts/release-windows-*/simplicity-engine-windows-*.zip
            artifacts/release-macos-*/simplicity-engine-macos-*.tar.gz
          generate_release_notes: true
